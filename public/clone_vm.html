<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clone a VM</title>
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.12.0/css/all.css">
  <link rel="icon" type="image/x-icon" href="./VMM.ico">
  <script>(function(){var t=localStorage.getItem('vmm-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="./style.css">
  <style>
    .clonediv {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 60px);
      padding: 32px 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      animation: fadeSlideUp 0.45s var(--ease) both;
    }

    h1 {
      text-align: center;
      font-size: 1.3em;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 24px;
      color: var(--text);
    }

    .form-group { margin-bottom: 18px; }

    .container button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: box-shadow var(--transition), filter var(--transition), transform var(--transition);
    }

    .container button[type="submit"]:hover {
      box-shadow: 0 0 22px var(--accent-glow);
      filter: brightness(1.1);
    }

    .id   { color: var(--accent2); font-weight: 700; }
    .name { color: var(--success);  font-weight: 700; }
  </style>
</head>
<body>
    <nav class="modern-navbar">
        <img src="./img/VMM.png" alt="VMM" style="width: 50px; margin-right: 5px;">
        <div class="logo">Virtual Machines Manager</div>
        <a href="https://www.canva.com/design/DAGdy8ez_i0/8oSJ8xHat-2Lvol-OGj4XQ/view?utm_content=DAGdy8ez_i0&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hd46a505919#1" target="_blank" class="tuto-link">Tutorial</a>
        <ul class="nav-links">
          <li><a href="/dashboard">Home</a></li>
          <li><a href="/clone-vm">Clone VM</a></li>
          <li><a href="/new-vm">New VM</a></li>
          <li><a href="/del-vm">Delete VM</a></li>
          <li><a href="#" id="logout">Log out</a></li>
        </ul>
    </nav>

    <div class="clonediv">
        <div class="container">
            <h1>Clone a VM</h1>
            <form id="cloneVmForm">
              <div class="form-group">
                <label for="sourceVmid">Source VM ID:</label>
                <select id="sourceVmid" required>
                  <option value="" disabled selected>Loading VMs...</option>
                </select>
              </div>
              <div class="form-group">
                <label for="newVmid">New VM ID:</label>
                <input type="number" id="newVmid" placeholder="Loading..." disabled required>
              </div>
              <div class="form-group">
                <label for="newVmName">Name of the cloned VM:</label>
                <input type="text" id="newVmName" placeholder="Enter the new VM name" required>
              </div>

              <button type="submit">Clone</button>
            </form>
            <div id="result" class="error-message"></div>
        </div>
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        let username, password;

        try {
            const userCredentials = getCookie('userCredentials');
            if (!userCredentials) throw new Error('Cookie userCredentials introuvable');

            const decodedUrl = decodeURIComponent(userCredentials);
            const decodedCredentials = atob(decodedUrl);
            [username, password] = decodedCredentials.split(':');

            if (!username || !password) throw new Error('Identifiant ou mot de passe manquant');
        } catch (error) {
            console.error('Erreur lors du décodage du cookie userCredentials :', error);
            showToast('Authentication cookie error. Please log in again.', 'error');
            window.location.href = '/login';
            return;
        }

        async function fetchTemplates() {
            const sourceVmidSelect = document.getElementById('sourceVmid');
            try {
                const response = await fetch(`/all-vms?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                if (!response.ok) throw new Error('Erreur lors de la récupération des VMs.');

                const vms = await response.json();

                // Filtrer les VMs avec le tag "template"
                const templates = vms.filter(vm => vm.tags && vm.tags.includes('template'));

                if (templates.length === 0) {
                    sourceVmidSelect.innerHTML = `<option value="" disabled>No VM with the tag "template"</option>`;
                    return;
                }

                // Ajouter les options au select
                sourceVmidSelect.innerHTML = templates
                    .map(vm => `<option value="${vm.vmid}" data-node="${vm.node || ''}">ID: ${vm.vmid} - Nom: ${vm.name}</option>`)
                    .join('');
            } catch (error) {
                console.error('Erreur lors de la récupération des VMs avec le tag "template" :', error);
                sourceVmidSelect.innerHTML = `<option value="" disabled>Loading error</option>`;
            }
        }

        fetchTemplates();

        async function fetchVMID() {
            const newVmidInput = document.getElementById('newVmid');
            try {
                const response = await fetch(`/all-vms?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                if (!response.ok) throw new Error('Failed to fetch VMs');

                const vms = await response.json();
                const maxVMID = Math.max(...vms.map(vm => vm.vmid), 0);
                newVmidInput.value = maxVMID + 1;
                newVmidInput.disabled = false;
            } catch (error) {
                console.error('Error fetching VMID:', error);
                newVmidInput.placeholder = 'Loading error';
            }
        }

        fetchVMID();

        document.getElementById('cloneVmForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const sourceVmid = document.getElementById('sourceVmid').value;
            const newVmid = document.getElementById('newVmid').value;
            const newVmName = document.getElementById('newVmName').value;

            try {
                const nodeVal = document.getElementById('sourceVmid').selectedOptions[0]?.dataset?.node || '';
                const response = await fetch(`/clone-vm?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sourceVmid, newVmid, newVmName, node: nodeVal })
                });

                const resultElement = document.getElementById('result');

                if (response.ok) {
                    const data = await response.json();
                    resultElement.className = 'success-message';
                    resultElement.textContent = `VM cloned successfully: ${data.message}`;
                    window.location.href = '/dashboard';
                } else {
                    const error = await response.json();
                    resultElement.className = 'error-message';
                    resultElement.textContent = `Error: ${error.message}`;
                }
            } catch (error) {
                console.error('Erreur lors du clonage de la VM :', error);
                document.getElementById('result').className = 'error-message';
                document.getElementById('result').textContent = 'An error occurred while cloning the VM.';
            }
        });
    });
  </script>
  <script src="./toast.js"></script>
  <script src="./logout.js"></script>
</body>
</html>
