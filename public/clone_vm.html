<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloner une VM</title>
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.12.0/css/all.css">
  <link rel="icon" type="image/x-icon" href="./VMM.ico">
  <style>
    /* Styles généraux */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }

    .modern-navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: #2c3e50;
      color: white;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      flex-wrap: wrap;
    }

    .modern-navbar .logo {
      font-size: 1.5em;
      font-weight: bold;
      flex: 1 1 auto;
    }

    .modern-navbar .nav-links {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      flex: 1 1 auto;
    }

    .modern-navbar .nav-links li {
      display: inline;
    }

    .modern-navbar .nav-links a {
      text-decoration: none;
      font-weight: bold;
      color: white;
      padding: 10px 15px;
      border-radius: 15px;
      background-color: #364b61;
      transition: background-color 0.3s ease;
      text-align: center;
    }

    .modern-navbar .nav-links a:hover {
      background-color: #2c3e50;
    }

    #logout {
      background-color: #991818;
    }

    #logout:hover {
      background-color: #bb2121;
    }

    .clonediv {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 500px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input {
      width: 95%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    select {
      width: 99%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #328bd4;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #256fa1;
    }

    .error-message {
      color: red;
      text-align: center;
      margin-top: 10px;
    }

    .success-message {
      color: green;
      text-align: center;
      margin-top: 10px;
    }

    .id {
      color: #328bd4;
    }

    .name {
      color: #32d468;
    }
  </style>
</head>
<body>
    <nav class="modern-navbar">
        <img src="./img/VMM.png" alt="VMM" style="width: 50px; margin-right: 5px;">
        <div class="logo">Virtual Machines Manager</div>
        <ul class="nav-links">
          <li><a href="/dashboard">Accueil</a></li>
          <li><a href="https://www.canva.com/design/DAGdy8ez_i0/8oSJ8xHat-2Lvol-OGj4XQ/view?utm_content=DAGdy8ez_i0&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hd46a505919#1" target="_blank">Tuto</a></li>
          <li><a href="/clone-vm">Cloner VM</a></li>
          <li><a href="/new-vm">Nouvelle VM</a></li>
          <li><a href="/del-vm">Supprimer VM</a></li>
          <li><a href="#" id="logout">Se déconnecter</a></li>
        </ul>
    </nav>

    <div class="clonediv">
        <div class="container">
            <h1>Cloner une VM</h1>
            <form id="cloneVmForm">
              <label for="sourceVmid">ID de la VM source :</label>
              <select id="sourceVmid" required>
                <option value="" disabled selected>Chargement des VMs...</option>
              </select>

              <label for="newVmid">Nouvel ID de la VM clonée :</label>
              <input type="number" id="newVmid" placeholder="Chargement..." disabled required>

              <label for="newVmName">Nom de la VM clonée :</label>
              <input type="text" id="newVmName" placeholder="Entrez le nom de la nouvelle VM" required>

              <button type="submit">Cloner</button>
            </form>
            <div id="result" class="error-message"></div>
        </div>
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        let username, password;

        try {
            const userCredentials = getCookie('userCredentials');
            if (!userCredentials) throw new Error('Cookie userCredentials introuvable');

            const decodedUrl = decodeURIComponent(userCredentials);
            const decodedCredentials = atob(decodedUrl);
            [username, password] = decodedCredentials.split(':');

            if (!username || !password) throw new Error('Identifiant ou mot de passe manquant');
        } catch (error) {
            console.error('Erreur lors du décodage du cookie userCredentials :', error);
            alert('Erreur avec le cookie d\'authentification. Veuillez vous reconnecter.');
            window.location.href = '/login';
            return;
        }

        async function fetchTemplates() {
            const sourceVmidSelect = document.getElementById('sourceVmid');
            try {
                const response = await fetch(`/all-vms?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                if (!response.ok) throw new Error('Erreur lors de la récupération des VMs.');

                const vms = await response.json();

                // Filtrer les VMs avec le tag "template"
                const templates = vms.filter(vm => vm.tags && vm.tags.includes('template'));

                if (templates.length === 0) {
                    sourceVmidSelect.innerHTML = `<option value="" disabled>Aucune VM avec le tag "template"</option>`;
                    return;
                }

                // Ajouter les options au select
                sourceVmidSelect.innerHTML = templates
                    .map(vm => `<option value="${vm.vmid}" data-node="${vm.node || ''}">ID: ${vm.vmid} - Nom: ${vm.name}</option>`)
                    .join('');
            } catch (error) {
                console.error('Erreur lors de la récupération des VMs avec le tag "template" :', error);
                sourceVmidSelect.innerHTML = `<option value="" disabled>Erreur lors du chargement</option>`;
            }
        }

        fetchTemplates();

        async function fetchVMID() {
            const newVmidInput = document.getElementById('newVmid');
            try {
                const response = await fetch(`/all-vms?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                if (!response.ok) throw new Error('Failed to fetch VMs');

                const vms = await response.json();
                const maxVMID = Math.max(...vms.map(vm => vm.vmid), 0);
                newVmidInput.value = maxVMID + 1;
                newVmidInput.disabled = false;
            } catch (error) {
                console.error('Error fetching VMID:', error);
                newVmidInput.placeholder = 'Erreur lors du chargement';
            }
        }

        fetchVMID();

        document.getElementById('cloneVmForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const sourceVmid = document.getElementById('sourceVmid').value;
            const newVmid = document.getElementById('newVmid').value;
            const newVmName = document.getElementById('newVmName').value;

            try {
                const nodeVal = document.getElementById('sourceVmid').selectedOptions[0]?.dataset?.node || '';
                const response = await fetch(`/clone-vm?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sourceVmid, newVmid, newVmName, node: nodeVal })
                });

                const resultElement = document.getElementById('result');

                if (response.ok) {
                    const data = await response.json();
                    resultElement.className = 'success-message';
                    resultElement.textContent = `VM clonée avec succès : ${data.message}`;
                    window.location.href = '/dashboard';
                } else {
                    const error = await response.json();
                    resultElement.className = 'error-message';
                    resultElement.textContent = `Erreur : ${error.message}`;
                }
            } catch (error) {
                console.error('Erreur lors du clonage de la VM :', error);
                document.getElementById('result').className = 'error-message';
                document.getElementById('result').textContent = 'Une erreur est survenue lors du clonage de la VM.';
            }
        });
    });
  </script>
  <script src="./logout.js"></script>
</body>
</html>
