<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create a new virtual machine</title>
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.12.0/css/all.css">
  <link rel="icon" type="image/x-icon" href="./VMM.ico">
  <script>(function(){var t=localStorage.getItem('vmm-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="./style.css">
  <style>
    .container {
      max-width: 760px;
      margin: 32px auto;
      background: rgba(255,255,255,0.05);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px 32px;
      animation: fadeSlideUp 0.45s var(--ease) both;
    }

    .tabs {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      padding-bottom: 0;
    }

    .tab {
      padding: 8px 20px;
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.85em;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }

    .tab:hover:not(.active) {
      background: var(--surface);
      color: var(--text);
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
      border-bottom-color: transparent;
      margin-bottom: -1px;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.2s ease both; }

    .form-group { margin-bottom: 18px; }

    .container button[type="submit"] {
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 0.9em;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow var(--transition), filter var(--transition), transform var(--transition);
    }

    .container button[type="submit"]:hover {
      box-shadow: 0 0 20px var(--accent-glow);
      filter: brightness(1.1);
    }

    small { display: block; margin-top: 5px; font-size: 0.78em; color: var(--text-muted); }
  </style>
</head>
<body>
    <nav class="modern-navbar">
        <img src="./img/VMM.png" alt="VMM" style="width: 50px; margin-right: 5px;">
        <div class="logo">Virtual Machines Manager</div>
        <a href="https://www.canva.com/design/DAGdy8ez_i0/8oSJ8xHat-2Lvol-OGj4XQ/view?utm_content=DAGdy8ez_i0&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hd46a505919#1" target="_blank" class="tuto-link">Tutorial</a>
        <ul class="nav-links">
            <li><a href="/dashboard">Home</a></li>
            <li><a href="/clone-vm">Clone VM</a></li>
            <li><a href="/new-vm">New VM</a></li>
            <li><a href="/del-vm">Delete VM</a></li>
            <li><a href="#" id="logout">Log out</a></li>
        </ul>
    </nav>
    
    <div class="welcome">
        <h1 id="welcome-user">Create a new Virtual Machine</h1>
    </div>

    <div class="node-bar" id="nodeBar"><span class="node-bar-label">Node :</span></div>

  <div class="container">
    <div class="tabs">
      <div class="tab active" data-target="general">General</div>
      <div class="tab" data-target="os">OS</div>
      <div class="tab" data-target="disks">Disk</div>
      <div class="tab" data-target="cpu1">CPU</div>
      <div class="tab" data-target="memory">RAM</div>
      <div class="tab" data-target="confirm">Confirm</div>
    </div>

    <form id="createVmForm">
      <!-- General -->
      <div class="tab-content active" id="general">
        <div class="form-group">
          <label for="vmid">VM ID:</label>
          <input type="number" id="vmid" name="vmid" required>
        </div>
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="tags">Tags:</label>
            <input type="text" id="tags" name="tags" placeholder="Enter tags (comma-separated)">
          </div>
      </div>

      <!-- OS -->
      <div class="tab-content" id="os">
        <div class="form-group">
          <label for="iso-image">ISO:</label>
          <select id="iso-image" name="isoImage" required>
            <!-- Dynamically load ISO options -->
          </select>
        </div>
      </div>

      <!-- Disks -->
      <div class="tab-content" id="disks">
        <div class="form-group">
          <label for="storage">Storage:</label>
          <select id="storage" name="storage" required>
            <option value="">Loading storages...</option>
          </select>
          <small id="storage-info" style="display:block;margin-top:6px;color:#555;"></small>
        </div>

        <div class="form-group">
          <label for="disk-size">Disk size (GiB):</label>
          <input type="number" id="disk-size" name="diskSize" required min="1">
          <small id="disk-hint" style="display:block;margin-top:6px;color:#777;"></small>
        </div>
      </div>

      <!-- CPU -->
      <div class="tab-content" id="cpu1">
        <div class="form-group">
          <label for="sockets">Sockets:</label>
          <input type="number" id="sockets" name="sockets" required>
        </div>
        <div class="form-group">
          <label for="cores">Cores:</label>
          <input type="number" id="cores" name="cores" required>
        </div>
      </div>

      <!-- Memory -->
      <div class="tab-content" id="memory">
        <div class="form-group">
          <label for="memory">RAM (MiB):</label>
          <input type="number" id="memory" name="memory" required>
        </div>
      </div>

      <!-- Confirm -->
      <div class="tab-content" id="confirm">
        <h3>Create your new Virtual Machine</h3>
        <button type="submit" class="button">Create</button>
      </div>
    </form>
  </div>

  <script>
    let currentNode = sessionStorage.getItem('selectedNode') || null;

    document.addEventListener('DOMContentLoaded', async () => {
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.add('active');
            });
        });

        // Fonction pour récupérer les cookies
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        let username, password;

        try {
            // Récupérer et décoder le cookie contenant les identifiants
            const userCredentials = getCookie('userCredentials');
            if (!userCredentials) throw new Error('Cookie userCredentials introuvable');

            const decodedUrl = decodeURIComponent(userCredentials);
            const decodedCredentials = atob(decodedUrl);
            [username, password] = decodedCredentials.split(':');

            if (!username || !password) throw new Error('Identifiant ou mot de passe manquant');
        } catch (error) {
            console.error('Erreur lors du décodage du cookie userCredentials :', error);
            showToast('Authentication cookie error. Please log in again.', 'error');
            window.location.href = '/login';
            return;
        }

        async function fetchIso() {
            const isoImageSelect = document.getElementById('iso-image');
            try {
                const response = await fetch(`/iso-list?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&node=${encodeURIComponent(currentNode || '')}`);
                if (!response.ok) throw new Error('Failed to fetch ISO images');

                const isoImages = await response.json();
                isoImageSelect.innerHTML = isoImages
                    .map(iso => `<option value="${iso.volid}">${iso.volid}</option>`)
                    .join('');
            } catch (error) {
                console.error('Error fetching ISO images:', error);
                isoImageSelect.innerHTML = '<option value="">Error loading ISO images</option>';
            }
        }

        async function fetchVMID() {
            const vmidInput = document.getElementById('vmid');
            try {
                const response = await fetch(`/all-vms?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                if (!response.ok) throw new Error('Failed to fetch VMs');

                const vms = await response.json();
                const maxVMID = Math.max(...vms.map(vm => vm.vmid), 0);
                vmidInput.value = maxVMID + 1;
            } catch (error) {
                console.error('Error fetching VMID:', error);
                vmidInput.placeholder = 'Enter VM ID';
            }
        }

        async function fetchStorages() {
          const storageSelect = document.getElementById('storage');
          const infoEl = document.getElementById('storage-info');
          const diskHint = document.getElementById('disk-hint');

          try {
            const resp = await fetch(`/storages?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&node=${encodeURIComponent(currentNode || '')}`);
            if (!resp.ok) throw new Error('Failed to fetch storages');
            const storages = await resp.json();

            if (!storages.length) {
              storageSelect.innerHTML = '<option value="">No compatible storage found</option>';
              infoEl.textContent = 'No storage accepting VM disks (content: images).';
              return;
            }

            storageSelect.innerHTML = storages.map(s => {
              const freeTxt = (s.availGiB != null) ? ` — libre: ${s.availGiB} GiB` : '';
              return `<option value="${s.storage}" data-avail="${s.availGiB ?? ''}">
                        ${s.storage} (${s.type})${freeTxt}
                      </option>`;
            }).join('');

            // MAJ info + contrainte taille
            const updateInfo = () => {
              const opt = storageSelect.selectedOptions[0];
              const avail = parseFloat(opt?.dataset?.avail || 'NaN');
              if (!isNaN(avail)) {
                infoEl.textContent = `Estimated free space: ${avail} GiB`;
                // input hint
                const diskInput = document.getElementById('disk-size');
                diskInput.max = Math.floor(avail); // HTML hard limit
                diskHint.textContent = `Recommended max: ${Math.floor(avail)} GiB (based on free space).`;
              } else {
                infoEl.textContent = 'Free space unavailable for this storage.';
                diskHint.textContent = '';
              }
            };

            storageSelect.addEventListener('change', updateInfo);
            updateInfo();
          } catch (e) {
            console.error('Error fetching storages:', e);
            storageSelect.innerHTML = '<option value="">Error loading storages</option>';
          }
        }

        function validateDiskSize() {
          const storageSelect = document.getElementById('storage');
          const diskInput = document.getElementById('disk-size');
          const opt = storageSelect.selectedOptions[0];
          const avail = parseFloat(opt?.dataset?.avail || 'NaN');
          if (!isNaN(avail) && parseFloat(diskInput.value) > avail) {
            showToast(`Disk size exceeds free space (${avail} GiB).`, 'warning');
            diskInput.value = Math.floor(avail);
          }
        }

        document.getElementById('disk-size').addEventListener('blur', validateDiskSize);

        async function loadNodesBar() {
            const bar = document.getElementById('nodeBar');
            if (!bar) return;
            try {
                const resp = await fetch(`/nodes?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                if (!resp.ok) return;
                const nodes = await resp.json();
                if (!currentNode && nodes.length > 0) {
                    currentNode = nodes[0].node;
                    sessionStorage.setItem('selectedNode', currentNode);
                }
                bar.innerHTML = '<span class="node-bar-label">Node :</span>';
                nodes.forEach(n => {
                    const tab = document.createElement('button');
                    tab.className = 'node-tab' + (n.node === currentNode ? ' active' : '') + (n.status !== 'online' ? ' offline' : '');
                    tab.textContent = n.node + (n.status !== 'online' ? ' (offline)' : '');
                    tab.addEventListener('click', () => {
                        currentNode = n.node;
                        sessionStorage.setItem('selectedNode', currentNode);
                        document.querySelectorAll('.node-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        fetchIso();
                        fetchStorages();
                    });
                    bar.appendChild(tab);
                });
            } catch(e) { console.error('Erreur chargement nodes:', e); }
        }

        await loadNodesBar();
        fetchIso();
        fetchVMID();
        fetchStorages();

        document.getElementById('createVmForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData);

            // Transformer les tags en tableau
            if (data.tags) {
                data.tags = data.tags.split(',').map(tag => tag.trim());
            } else {
                data.tags = []; // Si aucun tag n'est fourni
            }

            data.username = username;
            data.password = password;
            data.node    = currentNode || '';

            try {
                const response = await fetch('/new-vm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });

                if (response.ok) {
                    showToast('VM created successfully!', 'success');
                    const result = await response.json();
                    window.location.href = '/dashboard';
                } else {
                    const errorText = await response.text();
                    showToast(`Error creating VM: ${errorText}`, 'error');
                }
            } catch (error) {
                console.error('Erreur :', error);
                showToast('An error occurred while creating the VM.', 'error');
            }
        });
    });
  </script>
  <script src="./toast.js"></script>
  <script src="./logout.js"></script>
</body>
</html>
