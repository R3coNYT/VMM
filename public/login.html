<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMM — Connexion</title>
  <link rel="icon" type="image/x-icon" href="./VMM.ico">
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeSlideUp 0.5s var(--ease) both;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo img {
      width: 60px;
      filter: drop-shadow(0 0 18px rgba(99,102,241,0.5));
    }

    .login-logo h2 {
      margin-top: 12px;
      font-size: 1.35em;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .login-logo p {
      font-size: 0.82em;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .login-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px 28px;
    }

    .form-group { margin-bottom: 18px; }

    .login-card button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 0.95em;
      font-weight: 600;
      margin-top: 8px;
      cursor: pointer;
    }

    .login-card button:hover {
      box-shadow: 0 0 24px var(--accent-glow);
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <img src="./img/VMM.png" alt="VMM">
      <h2>Virtual Machine Manager</h2>
      <p>Connectez-vous à votre Proxmox</p>
    </div>
    <div class="login-card">
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Nom d'utilisateur</label>
          <input type="text" id="username" placeholder="admin" required>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit">Se connecter</button>
      </form>
      <div id="result" class="error-message"></div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const tryLogin = async (userWithRealm) => {
        try {
          const response = await fetch('/authenticate', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username: userWithRealm, password })
          });

          const result = await response.json();
          if (response.ok) {
            sessionStorage.setItem('token', result.ticket);
            document.cookie = `credentials=${btoa(`${userWithRealm}:${password}`)}; Secure; HttpOnly; SameSite=Strict; max-age=86400; path=/`;
            window.location.href = '/dashboard';
          } else {
            throw new Error(result.message);
          }
        } catch (error) {
          return false; // Retourne false si l'authentification échoue
        }
      };

      // Essayer avec @pam d'abord, puis avec @pve si échec
      const loginWithPam = await tryLogin(`${username}@pam`);
      if (!loginWithPam) {
        const loginWithPve = await tryLogin(`${username}@pve`);
        if (!loginWithPve) {
          const loginWithLdaps = await tryLogin(`${username}@LDAPS-FlavProx`);
          if (!loginWithLdaps) {
            document.getElementById('result').innerText = 'Erreur : Identifiants invalides.';
          }
        }
      }
    });
  </script>
</body>
</html>
