<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="icon" type="image/x-icon" href="./VMM.ico">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: #fff;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .login-container label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    .login-container input {
      width: 95%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .login-container button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .login-container button:hover {
      background: #0056b3;
    }

    .error-message {
      color: red;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Connexion</h2>
    <form id="loginForm">
      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" placeholder="Entrez votre nom d'utilisateur" required>
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Entrez votre mot de passe" required>
      <button type="submit">Se connecter</button>
    </form>
    <div id="result" class="error-message"></div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const tryLogin = async (userWithRealm) => {
        try {
          const response = await fetch('/authenticate', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username: userWithRealm, password })
          });

          const result = await response.json();
          if (response.ok) {
            sessionStorage.setItem('token', result.ticket);
            document.cookie = `credentials=${btoa(`${userWithRealm}:${password}`)}; Secure; HttpOnly; SameSite=Strict; max-age=86400; path=/`;
            window.location.href = '/dashboard';
          } else {
            throw new Error(result.message);
          }
        } catch (error) {
          return false; // Retourne false si l'authentification échoue
        }
      };

      // Essayer avec @pam d'abord, puis avec @pve si échec
      const loginWithPam = await tryLogin(`${username}@pam`);
      if (!loginWithPam) {
        const loginWithPve = await tryLogin(`${username}@pve`);
        if (!loginWithPve) {
          const loginWithLdaps = await tryLogin(`${username}@LDAPS-FlavProx`);
          if (!loginWithLdaps) {
            document.getElementById('result').innerText = 'Erreur : Identifiants invalides.';
          }
        }
      }
    });
  </script>
</body>
</html>
