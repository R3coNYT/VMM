<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord</title>
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.12.0/css/all.css">
  <link rel="icon" type="image/x-icon" href="./VMM.ico">
  <script>(function(){var t=localStorage.getItem('vmm-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="./style.css">
  <style>
    /* ── Layout ── */
    .container {
      display: flex;
      gap: 24px;
      padding: 24px 28px;
      align-items: flex-start;
    }

    .column1 {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .column1 h1, .column2 h1 {
      font-size: 0.72em;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 4px;
      padding: 0 0 10px;
      border-bottom: 1px solid var(--border);
    }

    .column2 {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .templategap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .othervms {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
    }

    /* ── VM Cards ── */
    .card {
      position: relative;
      width: 340px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-card);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      overflow: hidden;
      padding: 22px 22px 16px;
      display: flex;
      flex-direction: column;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      animation: fadeSlideUp 0.4s var(--ease) both;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: var(--radius) var(--radius) 0 0;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--border-hover);
      box-shadow: 0 24px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(99,102,241,0.2);
    }

    .card:hover::after { opacity: 1; }

    .card p { margin: 0; }

    #vmName {
      text-align: center;
      font-size: 1.08em;
      font-weight: 700;
      margin-bottom: 12px !important;
      letter-spacing: -0.01em;
    }

    #vmState {
      display: flex;
      align-items: center;
      font-size: 0.92em;
      margin-bottom: 10px;
      margin-left: 0;
    }

    #vmCharacteristics { margin-left: 0; }

    .characteristics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
      font-size: 0.88em;
      padding: 12px 0 8px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .characteristics div {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .characteristics div strong {
      font-size: 0.73em;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .characteristics div span { color: var(--accent2); font-weight: 600; }

    /* ── Tags ── */
    .tag {
      background: rgba(99,102,241,0.18);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 50px;
      padding: 1px 8px;
      color: #a5b4fc;
      font-size: 0.7em;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .tag.template {
      background: rgba(168,85,247,0.18);
      border-color: rgba(168,85,247,0.3);
      color: #c4b5fd;
    }

    .card .small { font-size: 0.85em; color: var(--text); font-weight: 500; }

    /* ── Card inner wrapper fills height so buttons stay at the bottom ── */
    .card > div {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ── Action Buttons ── */
    .actions {
      margin-top: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .button {
      width: 42px;
      height: 42px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), border-color var(--transition);
    }

    .button img { width: 52%; height: 52%; object-fit: contain; }
    .button img:hover { transform: none; }

    .button1 {
      background: rgba(16,185,129,0.15);
      border-color: rgba(16,185,129,0.3);
    }
    .button1:hover {
      background: rgba(16,185,129,0.3);
      border-color: rgba(16,185,129,0.6);
      box-shadow: 0 0 16px rgba(16,185,129,0.3);
      transform: scale(1.1);
    }

    .button2 {
      background: rgba(244,63,94,0.15);
      border-color: rgba(244,63,94,0.3);
    }
    .button2:hover {
      background: rgba(244,63,94,0.3);
      border-color: rgba(244,63,94,0.6);
      box-shadow: 0 0 16px rgba(244,63,94,0.3);
      transform: scale(1.1);
    }

    .button3 {
      width: 42px;
      height: 42px;
      background: rgba(34,211,238,0.12);
      border: 1px solid rgba(34,211,238,0.3);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      margin: 0;
    }

    .button3 img {
      width: 52%;
      height: 52%;
      object-fit: contain;
      transform: none;
    }

    .button3:hover {
      background: rgba(34,211,238,0.25);
      border-color: rgba(34,211,238,0.6);
      box-shadow: 0 0 16px rgba(34,211,238,0.3);
      transform: scale(1.1);
    }

    .button3 img:hover { transform: none; width: 52%; height: 52%; }

    /* ── Bouton Engrenage (Settings) ── */
    .button0 {
      background: rgba(148,163,184,0.12);
      border-color: rgba(148,163,184,0.25);
      color: var(--text-muted);
    }
    .button0:hover {
      background: rgba(148,163,184,0.25);
      border-color: rgba(148,163,184,0.55);
      box-shadow: 0 0 16px rgba(148,163,184,0.18);
      transform: scale(1.1);
      color: var(--text);
    }
    .button0 svg { transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); }
    .button0:hover svg { transform: rotate(60deg); }
    [data-theme="light"] .button0 { background: rgba(100,116,139,0.12); border-color: rgba(100,116,139,0.35); }

    /* ── Mode clair : boutons plus opaques + icônes visibles ── */
    [data-theme="light"] .button1 {
      background: rgba(16,185,129,0.22);
      border-color: rgba(16,185,129,0.55);
    }
    [data-theme="light"] .button2 {
      background: rgba(244,63,94,0.18);
      border-color: rgba(244,63,94,0.5);
    }
    [data-theme="light"] .button3 {
      background: rgba(34,211,238,0.18);
      border-color: rgba(34,211,238,0.5);
    }
    [data-theme="light"] .button img,
    [data-theme="light"] .button3 img {
      filter: invert(1) brightness(0.1);
    }

    /* ── Usage bars (CPU / RAM) ── */
    .vm-usage {
      padding: 10px 0 4px;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .usage-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .usage-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.68em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .usage-header span:first-child { color: var(--text-muted); }
    .usage-header span:last-child  { color: var(--text); font-weight: 700; }

    .usage-bar-track {
      height: 5px;
      background: rgba(255,255,255,0.09);
      border-radius: 3px;
      overflow: hidden;
    }

    .usage-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    }

    .usage-bar-fill.cpu  { background: linear-gradient(90deg, #6366f1, #a78bfa); }
    .usage-bar-fill.ram  { background: linear-gradient(90deg, #10b981, #34d399); }

    [data-theme="light"] .usage-bar-track { background: rgba(0,0,0,0.09); }

    /* ── VM Settings Modal ── */
    .vm-settings-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 9990;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease both;
    }
    .vm-settings-modal {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 90%; max-width: 520px; max-height: 88vh;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      animation: fadeSlideUp 0.3s var(--ease) both;
      overflow: hidden;
    }
    .vm-settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .vm-settings-header h2 { font-size: 1em; font-weight: 700; color: var(--text); margin: 0; }
    .vm-settings-close {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.8em; padding: 0;
      transition: background var(--transition), color var(--transition);
    }
    .vm-settings-close:hover { background: var(--surface-hover); color: var(--text); }
    .vm-settings-body {
      overflow-y: auto; padding: 18px 22px;
      flex: 1; display: flex; flex-direction: column; gap: 18px;
    }
    .settings-section { display: flex; flex-direction: column; gap: 10px; }
    .settings-section-title {
      font-size: 0.68em; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      padding-bottom: 7px; border-bottom: 1px solid var(--border); margin: 0;
    }
    .settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .settings-net-row {
      display: grid;
      grid-template-columns: 38px 1fr 80px auto;
      gap: 8px; align-items: center;
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .settings-net-label {
      font-size: 0.74em; font-weight: 700; color: var(--text-muted);
      font-family: 'Courier New', monospace;
    }
    .settings-net-toggle {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.74em; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      cursor: pointer; white-space: nowrap;
    }
    .settings-net-toggle input[type="checkbox"] { width: auto; margin: 0; accent-color: var(--accent); cursor: pointer; }
    .settings-net-row input[type="text"] { font-size: 0.8em; padding: 7px 8px; }
    .settings-net-row select { font-size: 0.8em; padding: 7px 8px; }
    .settings-net-row input:disabled,
    .settings-net-row select:disabled { opacity: 0.35; cursor: not-allowed; }
    .vm-settings-footer {
      display: flex; justify-content: flex-end; gap: 10px;
      padding: 14px 22px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .confirm-btn.primary { background: var(--accent); color: #fff; }
    .confirm-btn.primary:hover { box-shadow: 0 0 18px var(--accent-glow); filter: brightness(1.12); }
    [data-theme="light"] .settings-net-row { background: rgba(0,0,0,0.03); }
  </style>
</head>
<body>
  <!-- Vérification du token -->
  <script>
    if (!sessionStorage.getItem('token')) {
      window.location.href = '/';
    }
  </script>

  <nav class="modern-navbar">
    <img src="./img/VMM.png" alt="VMM" style="width: 50px; margin-right: 5px;">
    <div class="logo">Virtual Machines Manager</div>
    <a href="https://www.canva.com/design/DAGdy8ez_i0/8oSJ8xHat-2Lvol-OGj4XQ/view?utm_content=DAGdy8ez_i0&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hd46a505919#1" target="_blank" class="tuto-link">Tutorial</a>
    <ul class="nav-links">
      <li><a href="">Home</a></li>
      <li><a href="/iso">ISO</a></li>
      <li><a href="/clone-vm">Clone VM</a></li>
      <li><a href="/new-vm">New VM</a></li>
      <li><a href="/del-vm">Delete VM</a></li>
      <li><a href="#" id="logout">Log out</a></li>
    </ul>
  </nav>

  <div class="welcome">
    <h1 id="welcome-user">Welcome to your dashboard</h1>
  </div>

  <div class="node-bar" id="nodeBar"><span class="node-bar-label">Node :</span></div>

  <div class="container">
    <div class="column1">
      <h1>Templates</h1>
      <div id="templateColumn" class="templategap"></div>
    </div>
    <div class="column2">
      <h1>VMs</h1>
      <div id="otherVmsColumn" class="othervms"></div>
    </div>
  </div>

  <script>
    let currentNode = sessionStorage.getItem('selectedNode') || null;

    async function loadNodes() {
      let u, pw;
      try {
        const raw = getCookie('userCredentials');
        if (!raw) return;
        [u, pw] = atob(decodeURIComponent(raw)).split(':');
        if (!u || !pw) return;
      } catch(e) { return; }
      const bar = document.getElementById('nodeBar');
      if (!bar) return;
      try {
        const resp = await fetch(`/nodes?username=${encodeURIComponent(u)}&password=${encodeURIComponent(pw)}`);
        if (!resp.ok) return;
        const nodes = await resp.json();
        if (!currentNode && nodes.length > 0) {
          currentNode = nodes[0].node;
          sessionStorage.setItem('selectedNode', currentNode);
        }
        bar.innerHTML = '<span class="node-bar-label">Node :</span>';
        nodes.forEach(n => {
          const tab = document.createElement('button');
          tab.className = 'node-tab' + (n.node === currentNode ? ' active' : '') + (n.status !== 'online' ? ' offline' : '');
          tab.textContent = n.node + (n.status !== 'online' ? ' (offline)' : '');
          tab.addEventListener('click', () => {
            currentNode = n.node;
            sessionStorage.setItem('selectedNode', currentNode);
            document.querySelectorAll('.node-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            fetchVMs();
          });
          bar.appendChild(tab);
        });
      } catch(e) { console.error('Erreur chargement nodes:', e); }
    }

    async function fetchVMs() {
      // Fonction pour récupérer les cookies
      function getCookie(name) {
          const value = `; ${document.cookie}`;
          const parts = value.split(`; ${name}=`);
          if (parts.length === 2) return parts.pop().split(';').shift();
          return null;
      }

      let username, password;

      try {
        const userCredentials = getCookie('userCredentials');
        if (!userCredentials) throw new Error('Cookie userCredentials introuvable');

        const decodedUrl = decodeURIComponent(userCredentials);
         const decodedCredentials = atob(decodedUrl);
        [username, password] = decodedCredentials.split(':');

        if (!username || !password) throw new Error('Identifiant ou mot de passe manquant');
      } catch (error) {
        console.error('Erreur lors du décodage du cookie userCredentials :', error);
        showToast('Authentication cookie error. Please log in again.', 'error');
        window.location.href = '/login';
        return;
      }

      async function fetchPerms() {
        try {

          // Récupérer les permissions de l'utilisateur
          const response = await fetch(`/permissions?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
          if (!response.ok) throw new Error('Erreur lors de la récupération des permissions.');

          const permissions = await response.json();

          // Fonction pour vérifier si "VM.Clone" existe dans n'importe quelle section
          function hasVmClone(permissionsData) {
            if (!permissionsData) {
              return false;
            }

            const vmsSection = permissionsData['/vms'];

            if (vmsSection && vmsSection['VM.Clone'] === 1) {
              return true;
            }
            return false;
          }

          function hasVmCreationDeletion(permissionsData) {
            if (!permissionsData) {
              console.log("Les permissions sont nulles ou non définies.");
              return false;
            }

            const permissionsToCheck = [
              "VM.Allocate",
              "VM.Config.CDROM",
              "VM.Config.CPU",
              "VM.Config.Cloudinit",
              "VM.Config.Disk",
              "VM.Config.HWType",
              "VM.Config.Memory",
              "VM.Config.Network",
              "VM.Config.Options",
            ];

            const vmsSection = permissionsData["/vms"];

            if (vmsSection) {
              // Vérifier si la section `/vms` contient toutes les permissions requises
              const allPermissionsExist = permissionsToCheck.every(
                (permission) => vmsSection[permission] === 1
              );

              if (allPermissionsExist) {
                return true; // Retourner true si toutes les permissions sont présentes dans `/vms`
              }
            }

            return false; // Retourner false si `/vms` est absent ou ne contient pas toutes les permissions
          }

          const userHasVmClone = hasVmClone(permissions);
          const userHasVmCreationDeletion = hasVmCreationDeletion(permissions);

          // Si l'utilisateur n'a pas la permission "/", cacher certains éléments
          if (!permissions) {
          // Cacher les liens
            document.querySelector('a[href="/clone-vm"]').style.display = 'none';
            document.querySelector('a[href="/new-vm"]').style.display = 'none';
            document.querySelector('a[href="/del-vm"]').style.display = 'none';

            // Cacher la colonne Templates
            const column1 = document.querySelector('.column1');
            if (column1) {
              column1.style.display = 'none';
            }
          }

          if (!userHasVmClone) {
            document.querySelector('a[href="/clone-vm"]').style.display = 'none';
          
            // Cacher la colonne Templates
            const column1 = document.querySelector('.column1');
            if (column1) {
              column1.style.display = 'none';
            }
          }

          if (!userHasVmCreationDeletion) {
            document.querySelector('a[href="/new-vm"]').style.display = 'none';
            document.querySelector('a[href="/del-vm"]').style.display = 'none';
          }
        } catch (error) {
          console.error('Erreur lors de la vérification des permissions :', error);
          showToast('Unable to verify user permissions. Please try again.', 'error');
        }
      }

      fetchPerms();

      try {
        // Construire la requête avec les identifiants de l'utilisateur
        const response = await fetch(`/vms?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, {
            credentials: 'include'
        });

        if (!response.ok) {
            throw new Error(`Erreur HTTP ${response.status} : ${response.statusText}`);
        }

        const vms = await response.json();
        const filteredVMs = currentNode ? vms.filter(vm => vm.node === currentNode) : vms;

        const templateColumn = document.getElementById('templateColumn');
        const otherVmsColumn = document.getElementById('otherVmsColumn');

        // Carte existantes indexées par vmid
        const existingCards = {};
        document.querySelectorAll('.card[data-vmid]').forEach(c => {
          existingCards[c.dataset.vmid] = c;
        });
        const seenVmids = new Set();

        filteredVMs.forEach(vm => {
          const vmidStr = String(vm.vmid);
          seenVmids.add(vmidStr);

          const isTemplate = Array.isArray(vm.diskNames) &&
                            vm.diskNames.some(name => typeof name === 'string' && name.startsWith('base-'));

          // Si la carte existe déjà → on met à jour uniquement le statut
          if (existingCards[vmidStr]) {
            if (!isTemplate) {
              const stateEl = existingCards[vmidStr].querySelector('.vm-state');
              if (stateEl) {
                const dot   = stateEl.querySelector('.status-dot');
                const label = stateEl.querySelector('.vm-state-label');
                const running = vm.status === 'running';
                if (dot)   dot.className = `status-dot ${running ? 'running' : 'stopped'}`;
                if (label) {
                  label.style.color = running ? 'var(--success)' : 'var(--danger)';
                  label.textContent  = running ? 'Running' : 'Stopped';
                }
              }
              // Mise à jour des barres d'utilisation
              const usageEl = existingCards[vmidStr].querySelector('.vm-usage');
              if (usageEl) {
                const running = vm.status === 'running';
                usageEl.style.display = running ? '' : 'none';
                if (running) {
                  const cpuPct = Math.min(100, Math.round((vm.cpuUsage || 0) * 100));
                  const ramPct = vm.memMax > 0 ? Math.min(100, Math.round(((vm.memUsed || 0) / vm.memMax) * 100)) : 0;
                  const ramUsedGB = ((vm.memUsed || 0) / 1073741824).toFixed(1);
                  const cpuFill  = usageEl.querySelector('.usage-cpu-fill');
                  const cpuPctEl = usageEl.querySelector('.usage-cpu-pct');
                  const ramFill  = usageEl.querySelector('.usage-ram-fill');
                  const ramPctEl = usageEl.querySelector('.usage-ram-pct');
                  if (cpuFill)  cpuFill.style.width   = cpuPct + '%';
                  if (cpuPctEl) cpuPctEl.textContent   = cpuPct + '%';
                  if (ramFill)  ramFill.style.width    = ramPct + '%';
                  if (ramPctEl) ramPctEl.textContent   = `${ramPct}% · ${ramUsedGB}/${vm.maxmem} GB`;
                }
              }
            }
            return; // Pas de recréation
          }

          // Nouvelle carte → on la crée avec animation
          const card = document.createElement('div');
          card.classList.add('card');
          card.dataset.vmid = vmidStr;

          const tagsHTML = vm.tags
            ? vm.tags
                .split(';')
                .map(tag => `<strong class="tag ${isTemplate ? 'template' : ''}">${tag.trim()}</strong>`)
                .join(' ')
            : '';

          const stateHTML = isTemplate
            ? ''
            : `
              <p class="vm-state state">
                <span class="status-dot ${vm.status === 'running' ? 'running' : 'stopped'}"></span>
                <strong class="vm-state-label" style="color:${vm.status === 'running' ? 'var(--success)' : 'var(--danger)'}">
                  ${vm.status === 'running' ? 'Running' : 'Stopped'}
                </strong>
              </p>
            `;

          const actionsHTML = isTemplate
            ? ''
            : `
              <div class="actions">
                <button class="button button0" onclick="openVmSettings(${vm.vmid}, '${vm.node}')" title="Settings">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.68.07-1.08s-.03-.73-.07-1.08l2.32-1.8c.21-.16.27-.45.14-.68l-2.2-3.82c-.13-.23-.42-.3-.65-.22l-2.73 1.1c-.57-.44-1.18-.8-1.85-1.07L14.14 2h-4.28l-.41 2.93c-.67.27-1.28.63-1.85 1.07l-2.73-1.1c-.23-.08-.52 0-.65.22l-2.2 3.82c-.13.23-.07.52.14.68l2.32 1.8c-.04.35-.07.7-.07 1.08s.03.73.07 1.08l-2.32 1.8c-.21.16-.27.45-.14.68l2.2 3.82c.13.23.42.3.65.22l2.73-1.1c.57.44 1.18.8 1.85 1.07l.41 2.93h4.28l.41-2.93c.67-.27 1.28-.63 1.85-1.07l2.73 1.1c.23.08.52 0 .65-.22l2.2-3.82c.13-.23.07-.52-.14-.68l-2.32-1.8z"/></svg>
                </button>
                <button class="button button1" onclick="startVM(${vm.vmid}, '${vm.node}')">
                  <img src="./img/start.png" alt="Start">
                </button>
                <button class="button button2" onclick="stopVM(${vm.vmid}, '${vm.node}')">
                  <img src="./img/stop.png" alt="Stop">
                </button>
                <a target="_blank" href="https://${window.location.hostname}:8006/?console=kvm&novnc=1&vmid=${vm.vmid}&vmname=${vm.name}&node=${vm.node}&resize=off&cmd=" class="button3">
                  <img src="./img/screen.png" alt="Console">
                </a>
              </div>
            `;

          const cpuPct    = Math.min(100, Math.round((vm.cpuUsage || 0) * 100));
          const ramPct    = vm.memMax > 0 ? Math.min(100, Math.round(((vm.memUsed || 0) / vm.memMax) * 100)) : 0;
          const ramUsedGB = ((vm.memUsed || 0) / 1073741824).toFixed(1);
          const usageHTML = isTemplate ? '' : `
            <div class="vm-usage"${vm.status !== 'running' ? ' style="display:none"' : ''}>
              <div class="usage-row">
                <div class="usage-header"><span>CPU</span><span class="usage-cpu-pct">${cpuPct}%</span></div>
                <div class="usage-bar-track"><div class="usage-bar-fill cpu usage-cpu-fill" style="width:${cpuPct}%"></div></div>
              </div>
              <div class="usage-row">
                <div class="usage-header"><span>RAM</span><span class="usage-ram-pct">${ramPct}% · ${ramUsedGB}/${vm.maxmem} GB</span></div>
                <div class="usage-bar-track"><div class="usage-bar-fill ram usage-ram-fill" style="width:${ramPct}%"></div></div>
              </div>
            </div>
          `;

          card.innerHTML = `
            <div>
              <p id="vmName"><strong>${vm.name}</strong> ${tagsHTML}</p>
              <br>
              ${stateHTML}
              <div class="characteristics">
                <div>
                  <strong>VMID</strong><span>${vm.vmid}</span>
                </div>
                <div>
                  <strong>CPU</strong><span>${vm.maxcpu} cores</span>
                </div>
                <div>
                  <strong>RAM</strong><span>${vm.maxmem} GB</span>
                </div>
                <div>
                  <strong>Disk</strong><span>${vm.maxdisk} GB</span>
                </div>
              </div>
              ${usageHTML}
              ${actionsHTML}
            </div>
          `;

          if (isTemplate) {
            templateColumn.appendChild(card);
          } else {
            otherVmsColumn.appendChild(card);
          }
        });

        // Supprimer les cartes de VMs qui ne sont plus présentes
        Object.keys(existingCards).forEach(vmidStr => {
          if (!seenVmids.has(vmidStr)) existingCards[vmidStr].remove();
        });

      } catch (error) {
          console.error('Erreur lors de la récupération des VMs :', error);
          showToast('An error occurred while fetching virtual machines. Please try again.', 'error');
      }
    }

    // Rafraîchir automatiquement les statuts des VM toutes les 5 secondes
    setInterval(fetchVMs, 5000);

    // Fonction pour récupérer les cookies
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return null;
    }

    document.addEventListener('DOMContentLoaded', () => {
      let username;

      try {
        // Récupérer le cookie contenant les identifiants
        const userCredentials = getCookie('userCredentials');

        if (!userCredentials) {
          throw new Error('Cookie userCredentials introuvable');
        }

        // Décoder le cookie
        const decodedUrl = decodeURIComponent(userCredentials);
        const decodedCredentials = atob(decodedUrl);

        // Extraire le nom d'utilisateur
        [username] = decodedCredentials.split(':');

        if (!username) {
          throw new Error('Nom d\'utilisateur manquant après décodage');
        }

        // Retirer le suffixe (@pve ou @pam) du nom d'utilisateur
        username = username.split('@')[0];

        // Update welcome message with username
        const welcomeElement = document.getElementById('welcome-user');
        welcomeElement.innerHTML = `Welcome to your dashboard, <span style="color: #328bd4;">${username}</span>!`;
      } catch (error) {
        console.error('Erreur lors du décodage du cookie userCredentials :', error);
        showToast('Authentication cookie error. Please log in again.', 'error');
        window.location.href = '/login';
      }
    });

    async function startVM(vmid, node) {
      let username, password;

      try {
        // Récupérer le cookie contenant les identifiants
        const userCredentials = getCookie('userCredentials');

        if (!userCredentials) {
          throw new Error('Cookie userCredentials introuvable');
        }

        // Décoder le cookie
        const decodedUrl = decodeURIComponent(userCredentials);
        const decodedCredentials = atob(decodedUrl);

        // Extraire le nom d'utilisateur et le mot de passe
        [username, password] = decodedCredentials.split(':');

        if (!username || !password) {
          throw new Error('Identifiant ou mot de passe manquant après décodage');
        }
      } catch (error) {
        console.error('Erreur lors du décodage du cookie userCredentials :', error);
        showToast('Authentication cookie error. Please log in again.', 'error');
        window.location.href = '/login';
        return; // Arrêter l'exécution si le cookie est invalide
      }

      try {
        // Démarrer la VM avec les identifiants
        const response = await fetch(`/vms/${vmid}/start?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&node=${encodeURIComponent(node)}`, {
          method: 'POST',
          credentials: 'include',
        });

        if (!response.ok) {
          throw new Error(`Erreur HTTP ${response.status} : ${response.statusText}`);
        }

        showToast(`VM ${vmid} started.`, 'success');
        fetchVMs(); // Refresh VM list
      } catch (error) {
        console.error(`Erreur lors du démarrage de la VM ${vmid}:`, error);
      }
    }

    async function stopVM(vmid, node) {
      let username, password;

      try {
        // Récupérer le cookie contenant les identifiants
        const userCredentials = getCookie('userCredentials');

        if (!userCredentials) {
          throw new Error('Cookie userCredentials introuvable');
        }

        // Décoder le cookie
        const decodedUrl = decodeURIComponent(userCredentials);
        const decodedCredentials = atob(decodedUrl);

        // Extraire le nom d'utilisateur et le mot de passe
        [username, password] = decodedCredentials.split(':');

        if (!username || !password) {
          throw new Error('Identifiant ou mot de passe manquant après décodage');
        }
      } catch (error) {
        console.error('Erreur lors du décodage du cookie userCredentials :', error);
        showToast('Authentication cookie error. Please log in again.', 'error');
        window.location.href = '/login';
        return; // Arrêter l'exécution si le cookie est invalide
      }

      try {
        // Arrêter la VM avec les identifiants
        const response = await fetch(`/vms/${vmid}/stop?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&node=${encodeURIComponent(node)}`, {
          method: 'POST',
          credentials: 'include',
        });

        if (!response.ok) {
          throw new Error(`Erreur HTTP ${response.status} : ${response.statusText}`);
        }

        showToast(`VM ${vmid} stopped.`, 'success');
        fetchVMs(); // Refresh VM list
      } catch (error) {
        console.error(`Erreur lors de l'arrêt de la VM ${vmid}:`, error);
      }
    }

    // Charger initialement les nodes et les VMs
    loadNodes();
    fetchVMs();

    // ── VM Settings ───────────────────────────────────────────────
    let _settingsVmid = null, _settingsNode = null, _settingsOrigNets = {};

    function parseNetConfig(s) {
      if (!s) return { model: 'virtio', bridge: 'vmbr0', mac: '' };
      const parts = s.split(',');
      let model = 'virtio', bridge = 'vmbr0', mac = '';
      for (const p of parts) {
        if (p.startsWith('bridge=')) { bridge = p.slice(7); }
        else if (p.includes('=') && !/^(firewall|link_down|mtu|queues|rate|tag|trunks)=/.test(p)) {
          const eq = p.indexOf('='); model = p.slice(0, eq); mac = p.slice(eq + 1);
        }
      }
      return { model, bridge, mac };
    }

    function toggleNet(i) {
      const on = document.getElementById(`snet${i}-on`).checked;
      document.getElementById(`snet${i}-model`).disabled = !on;
      document.getElementById(`snet${i}-bridge`).disabled = !on;
    }

    async function openVmSettings(vmid, node) {
      _settingsVmid = vmid; _settingsNode = node;
      const card = document.querySelector(`.card[data-vmid="${vmid}"]`);
      const name = card?.querySelector('[id="vmName"] strong')?.textContent || `VM ${vmid}`;
      document.getElementById('vmsTitle').textContent = `⚙️  ${name} — ID ${vmid}`;
      document.getElementById('vmsOverlay').style.display = 'flex';
      try {
        const [u, pw] = atob(decodeURIComponent(getCookie('userCredentials'))).split(':');
        const r = await fetch(`/vms/${vmid}/config?username=${encodeURIComponent(u)}&password=${encodeURIComponent(pw)}&node=${encodeURIComponent(node)}`);
        if (!r.ok) throw new Error();
        const cfg = await r.json();
        document.getElementById('sMemory').value  = cfg.memory  || 512;
        document.getElementById('sCores').value   = cfg.cores   || 1;
        document.getElementById('sSockets').value = cfg.sockets || 1;
        document.getElementById('sBios').value    = cfg.bios    || 'seabios';
        document.getElementById('sScsiHw').value  = cfg.scsihw  || 'lsi';
        _settingsOrigNets = {};
        for (let i = 0; i < 4; i++) {
          const key = `net${i}`, val = cfg[key] || null;
          _settingsOrigNets[key] = val;
          const p = parseNetConfig(val);
          const on = !!val;
          document.getElementById(`snet${i}-on`).checked = on;
          document.getElementById(`snet${i}-model`).value    = p.model;
          document.getElementById(`snet${i}-model`).disabled  = !on;
          document.getElementById(`snet${i}-bridge`).value   = p.bridge;
          document.getElementById(`snet${i}-bridge`).disabled = !on;
        }
      } catch(e) {
        showToast('Failed to load configuration.', 'error');
        closeVmSettings();
      }
    }

    function closeVmSettings() {
      document.getElementById('vmsOverlay').style.display = 'none';
      _settingsVmid = null; _settingsNode = null;
    }

    async function saveVmSettings() {
      if (!_settingsVmid || !_settingsNode) return;
      try {
        const [u, pw] = atob(decodeURIComponent(getCookie('userCredentials'))).split(':');
        const updates = {
          memory:  document.getElementById('sMemory').value,
          cores:   document.getElementById('sCores').value,
          sockets: document.getElementById('sSockets').value,
          bios:    document.getElementById('sBios').value,
          scsihw:  document.getElementById('sScsiHw').value,
        };
        const toDelete = [];
        for (let i = 0; i < 4; i++) {
          const on  = document.getElementById(`snet${i}-on`).checked;
          const mdl = document.getElementById(`snet${i}-model`).value;
          const br  = document.getElementById(`snet${i}-bridge`).value;
          const orig = _settingsOrigNets[`net${i}`];
          if (on) {
            const mac = parseNetConfig(orig).mac;
            updates[`net${i}`] = mac ? `${mdl}=${mac},bridge=${br}` : `${mdl},bridge=${br}`;
          } else if (orig) {
            toDelete.push(`net${i}`);
          }
        }
        if (toDelete.length) updates['delete'] = toDelete.join(',');
        const r = await fetch(`/vms/${_settingsVmid}/config?username=${encodeURIComponent(u)}&password=${encodeURIComponent(pw)}&node=${encodeURIComponent(_settingsNode)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updates),
        });
        if (r.ok) {
          showToast('Configuration updated successfully!', 'success');
          closeVmSettings();
        } else {
          showToast(`Error: ${await r.text()}`, 'error');
        }
      } catch(e) {
        showToast('Failed to save configuration.', 'error');
      }
    }
  </script>

  <!-- ── VM Settings Modal ── -->
  <div id="vmsOverlay" class="vm-settings-overlay" style="display:none" onclick="if(event.target===this)closeVmSettings()">
    <div class="vm-settings-modal">
      <div class="vm-settings-header">
        <h2 id="vmsTitle">⚙️ Settings</h2>
        <button class="vm-settings-close" onclick="closeVmSettings()">&#10005;</button>
      </div>
      <div class="vm-settings-body">
        <div class="settings-section">
          <p class="settings-section-title">Memory</p>
          <div class="form-group">
            <label for="sMemory">RAM (MiB)</label>
            <input type="number" id="sMemory" min="256" step="256">
          </div>
        </div>
        <div class="settings-section">
          <p class="settings-section-title">CPU</p>
          <div class="settings-row">
            <div class="form-group">
              <label for="sCores">Cores</label>
              <input type="number" id="sCores" min="1" max="128">
            </div>
            <div class="form-group">
              <label for="sSockets">Sockets</label>
              <input type="number" id="sSockets" min="1" max="4">
            </div>
          </div>
        </div>
        <div class="settings-section">
          <p class="settings-section-title">System</p>
          <div class="settings-row">
            <div class="form-group">
              <label for="sBios">BIOS</label>
              <select id="sBios">
                <option value="seabios">SeaBIOS</option>
                <option value="ovmf">OVMF (UEFI)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="sScsiHw">SCSI Controller</label>
              <select id="sScsiHw">
                <option value="lsi">LSI 53C895A</option>
                <option value="lsi53c810">LSI 53C810</option>
                <option value="virtio-scsi-pci">VirtIO SCSI</option>
                <option value="virtio-scsi-single">VirtIO SCSI Single</option>
                <option value="megasas">MegaRAID SAS</option>
                <option value="pvscsi">VMware PVSCSI</option>
              </select>
            </div>
          </div>
        </div>
        <div class="settings-section">
          <p class="settings-section-title">Network Cards</p>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div class="settings-net-row">
              <span class="settings-net-label">net0</span>
              <select id="snet0-model"><option value="virtio">VirtIO</option><option value="e1000">Intel E1000</option><option value="rtl8139">Realtek RTL8139</option><option value="vmxnet3">vmxnet3</option></select>
              <input type="text" id="snet0-bridge" placeholder="vmbr0">
              <label class="settings-net-toggle"><input type="checkbox" id="snet0-on" onchange="toggleNet(0)"> Active</label>
            </div>
            <div class="settings-net-row">
              <span class="settings-net-label">net1</span>
              <select id="snet1-model"><option value="virtio">VirtIO</option><option value="e1000">Intel E1000</option><option value="rtl8139">Realtek RTL8139</option><option value="vmxnet3">vmxnet3</option></select>
              <input type="text" id="snet1-bridge" placeholder="vmbr0">
              <label class="settings-net-toggle"><input type="checkbox" id="snet1-on" onchange="toggleNet(1)"> Active</label>
            </div>
            <div class="settings-net-row">
              <span class="settings-net-label">net2</span>
              <select id="snet2-model"><option value="virtio">VirtIO</option><option value="e1000">Intel E1000</option><option value="rtl8139">Realtek RTL8139</option><option value="vmxnet3">vmxnet3</option></select>
              <input type="text" id="snet2-bridge" placeholder="vmbr0">
              <label class="settings-net-toggle"><input type="checkbox" id="snet2-on" onchange="toggleNet(2)"> Active</label>
            </div>
            <div class="settings-net-row">
              <span class="settings-net-label">net3</span>
              <select id="snet3-model"><option value="virtio">VirtIO</option><option value="e1000">Intel E1000</option><option value="rtl8139">Realtek RTL8139</option><option value="vmxnet3">vmxnet3</option></select>
              <input type="text" id="snet3-bridge" placeholder="vmbr0">
              <label class="settings-net-toggle"><input type="checkbox" id="snet3-on" onchange="toggleNet(3)"> Active</label>
            </div>
          </div>
        </div>
      </div>
      <div class="vm-settings-footer">
        <button class="confirm-btn cancel" onclick="closeVmSettings()">Cancel</button>
        <button class="confirm-btn primary" onclick="saveVmSettings()">Save</button>
      </div>
    </div>
  </div>

  <script src="./toast.js"></script>
  <script src="./logout.js"></script>
</body>
</html>
