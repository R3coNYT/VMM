<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete a VM</title>
  <link rel="icon" type="image/x-icon" href="./VMM.ico">
  <script>(function(){var t=localStorage.getItem('vmm-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="./style.css">
  <style>
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 32px 20px;
    }

    .delete-vm-container {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid rgba(244,63,94,0.2);
      border-radius: 20px;
      padding: 32px 28px;
      animation: fadeSlideUp 0.45s var(--ease) both;
    }

    .delete-vm-container h2 {
      text-align: center;
      font-size: 1.25em;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    .form-group { margin-bottom: 18px; }

    .delete-vm-container button[type="submit"] {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow var(--transition), filter var(--transition), transform var(--transition);
    }

    .delete-vm-container button[type="submit"]:hover {
      box-shadow: 0 0 22px var(--danger-glow);
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
    <nav class="modern-navbar">
    <img src="./img/VMM.png" alt="VMM" style="width: 50px; margin-right: 5px;">
    <div class="logo">Virtual Machines Manager</div>
    <a href="https://www.canva.com/design/DAGdy8ez_i0/8oSJ8xHat-2Lvol-OGj4XQ/view?utm_content=DAGdy8ez_i0&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hd46a505919#1" target="_blank" class="tuto-link">Tutorial</a>
    <ul class="nav-links">
      <li><a href="/dashboard">Home</a></li>
      <li><a href="/iso">ISO</a></li>
      <li><a href="/clone-vm">Clone VM</a></li>
      <li><a href="/new-vm">New VM</a></li>
      <li><a href="/del-vm">Delete VM</a></li>
      <li><a href="#" id="logout">Log out</a></li>
    </ul>
  </nav>

  <div class="welcome">
    <h1 id="welcome-user">Delete a VM</h1>
  </div>

  <div class="node-bar" id="nodeBar"><span class="node-bar-label">Node :</span></div>

    <div class="container">
        <div class="delete-vm-container">
            <h2>Delete a VM</h2>
            <form id="deleteVmForm">
              <div class="form-group">
                <label for="vmid">Select a VM</label>
                <select id="vmid" required>
                  <option value="" disabled selected>Loading VMs...</option>
                </select>
              </div>
              <button type="submit">Delete</button>
            </form>
            <div id="result"></div>
        </div>
    </div>

  <script>
    let allDeletableVMs = [];
    let currentNode = null;

    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return null;
    }

    function getCredentials() {
      const userCredentials = getCookie('userCredentials');
      if (!userCredentials) throw new Error('No credentials cookie');
      const [u, p] = atob(decodeURIComponent(userCredentials)).split(':');
      if (!u || !p) throw new Error('Invalid credentials');
      return [u, p];
    }

    function renderVMSelect(node) {
      const vmidSelect = document.getElementById('vmid');
      const list = node ? allDeletableVMs.filter(vm => vm.node === node) : allDeletableVMs;
      if (list.length === 0) {
        vmidSelect.innerHTML = `<option value="" disabled selected>No VMs on this node</option>`;
      } else {
        vmidSelect.innerHTML = list
          .map(vm => `<option value="${vm.vmid}" data-node="${vm.node || ''}">ID: ${vm.vmid} - ${vm.name} (${vm.node})</option>`)
          .join('');
      }
    }

    async function loadNodesBar() {
      const bar = document.getElementById('nodeBar');
      try {
        const [u, pw] = getCredentials();
        const resp = await fetch(`/nodes?username=${encodeURIComponent(u)}&password=${encodeURIComponent(pw)}`);
        if (!resp.ok) return;
        const nodes = await resp.json();
        bar.innerHTML = '<span class="node-bar-label">Node :</span>';
        // "All" tab
        const allTab = document.createElement('button');
        allTab.className = 'node-tab' + (currentNode === null ? ' active' : '');
        allTab.textContent = 'All';
        allTab.addEventListener('click', () => {
          currentNode = null;
          document.querySelectorAll('.node-tab').forEach(t => t.classList.remove('active'));
          allTab.classList.add('active');
          renderVMSelect(null);
        });
        bar.appendChild(allTab);
        nodes.forEach(n => {
          const tab = document.createElement('button');
          tab.className = 'node-tab' + (n.node === currentNode ? ' active' : '') + (n.status !== 'online' ? ' offline' : '');
          tab.textContent = n.node + (n.status !== 'online' ? ' (offline)' : '');
          tab.addEventListener('click', () => {
            currentNode = n.node;
            document.querySelectorAll('.node-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderVMSelect(currentNode);
          });
          bar.appendChild(tab);
        });
      } catch(e) { console.error('Error loading nodes bar:', e); }
    }

    async function fetchVMs() {
      const vmidSelect = document.getElementById('vmid');
      try {
        const [username, password] = getCredentials();
        const response = await fetch(`/all-vms?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
        if (!response.ok) throw new Error('Failed to fetch VMs');
        const vms = await response.json();
        allDeletableVMs = vms.filter(vm => {
          const tags = vm.tags ? vm.tags.split(';').map(t => t.trim().toLowerCase()) : [];
          return !tags.includes('template') && !tags.includes('perso');
        });
        renderVMSelect(currentNode);
      } catch (error) {
        if (error.message === 'No credentials cookie' || error.message === 'Invalid credentials') {
          showToast('Authentication cookie error. Please log in again.', 'error');
          window.location.href = '/login';
          return;
        }
        console.error('Error fetching VMs:', error);
        vmidSelect.innerHTML = `<option value="" disabled>Loading error</option>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadNodesBar();
      fetchVMs();
    });

    document.getElementById('deleteVmForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const vmidSelect = document.getElementById('vmid');
      const vmid = vmidSelect.value;
      const vmNode = vmidSelect.selectedOptions[0]?.dataset?.node || '';

      if (!await showConfirm(`Are you sure you want to delete VM with VMID ${vmid}?`)) {
        return;
      }

      let username, password;
      try {
        [username, password] = getCredentials();
      } catch (error) {
        showToast('Authentication cookie error. Please log in again.', 'error');
        window.location.href = '/login';
        return;
      }

      try {
        const response = await fetch(`/vms/${vmid}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&node=${encodeURIComponent(vmNode)}`, {
          method: 'DELETE',
          credentials: 'include',
        });

        const resultElement = document.getElementById('result');
        if (response.ok) {
          const message = await response.text();
          resultElement.className = 'success-message';
          resultElement.textContent = `Success: ${message}`;
          setTimeout(() => (window.location.href = '/dashboard'), 1000);
        } else {
          const errorText = await response.text();
          resultElement.className = 'error-message';
          resultElement.textContent = `Error: ${errorText}`;
        }
      } catch (error) {
        console.error('Error deleting VM:', error);
        const resultElement = document.getElementById('result');
        resultElement.className = 'error-message';
        resultElement.textContent = 'An error occurred while deleting the VM.';
      }
    });
  </script>
  <script src="./toast.js"></script>
  <script src="./logout.js"></script>
</body>
</html>
