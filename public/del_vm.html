<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete a VM</title>
  <link rel="icon" type="image/x-icon" href="./VMM.ico">
  <script>(function(){var t=localStorage.getItem('vmm-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="./style.css">
  <style>
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 48px 20px;
    }

    .delete-vm-container {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid rgba(244,63,94,0.2);
      border-radius: 20px;
      padding: 32px 28px;
      animation: fadeSlideUp 0.45s var(--ease) both;
    }

    .delete-vm-container h2 {
      text-align: center;
      font-size: 1.25em;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    .form-group { margin-bottom: 18px; }

    .delete-vm-container button[type="submit"] {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow var(--transition), filter var(--transition), transform var(--transition);
    }

    .delete-vm-container button[type="submit"]:hover {
      box-shadow: 0 0 22px var(--danger-glow);
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
    <nav class="modern-navbar">
    <img src="./img/VMM.png" alt="VMM" style="width: 50px; margin-right: 5px;">
    <div class="logo">Virtual Machines Manager</div>
    <a href="https://www.canva.com/design/DAGdy8ez_i0/8oSJ8xHat-2Lvol-OGj4XQ/view?utm_content=DAGdy8ez_i0&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hd46a505919#1" target="_blank" class="tuto-link">Tutorial</a>
    <ul class="nav-links">
      <li><a href="/dashboard">Home</a></li>
      <li><a href="/clone-vm">Clone VM</a></li>
      <li><a href="/new-vm">New VM</a></li>
      <li><a href="/del-vm">Delete VM</a></li>
      <li><a href="#" id="logout">Log out</a></li>
    </ul>
  </nav>

  <div class="welcome">
    <h1 id="welcome-user">Delete a VM</h1>
  </div>

    <div class="container">
        <div class="delete-vm-container">
            <h2>Delete a VM</h2>
            <form id="deleteVmForm">
              <label for="vmid">Select a VM</label>
              <select id="vmid" required>
                <option value="" disabled selected>Loading VMs...</option>
              </select>
              <br>
              <button type="submit">Delete</button>
            </form>
            <div id="result"></div>
        </div>
    </div>

  <script>
    async function fetchVMs() {
      const vmidSelect = document.getElementById('vmid');
      try {
        // Fonction pour récupérer les cookies
        function getCookie(name) {
          const value = `; ${document.cookie}`;
          const parts = value.split(`; ${name}=`);

          if (parts.length === 2) return parts.pop().split(';').shift();
          return null;
        }

        let username, password;

        try {
          const userCredentials = getCookie('userCredentials');
          if (!userCredentials) throw new Error('Cookie userCredentials introuvable');

          const decodedUrl = decodeURIComponent(userCredentials);
          const decodedCredentials = atob(decodedUrl);

          [username, password] = decodedCredentials.split(':');
          if (!username || !password) throw new Error('Identifiant ou mot de passe manquant');
        } catch (error) {
          console.error('Erreur lors du décodage du cookie userCredentials :', error);
          showToast('Authentication cookie error. Please log in again.', 'error');
          window.location.href = '/login';
          return;
        }

        // Fetch VMs
        const response = await fetch(`/all-vms?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
        if (!response.ok) throw new Error('Erreur lors de la récupération des VMs.');

        const vms = await response.json();

        if (vms.length === 0) {
          vmidSelect.innerHTML = `<option value="" disabled>No VMs available</option>`;
          return;
        }

        // Filtrer les VMs pour exclure celles ayant les tags 'template' ou 'perso'
        const filteredVMs = vms.filter(vm => {
          const tags = vm.tags ? vm.tags.split(';').map(tag => tag.trim().toLowerCase()) : [];
          return !tags.includes('template') && !tags.includes('perso');
        });

        // Ajouter les options au select
        if (filteredVMs.length === 0) {
          vmidSelect.innerHTML = `<option value="" disabled>No VMs available (excluding templates and personal)</option>`;
        } else {
          vmidSelect.innerHTML = filteredVMs
            .map(vm => `<option value="${vm.vmid}" data-node="${vm.node || ''}">ID: ${vm.vmid} - Nom: ${vm.name}</option>`)
            .join('');
        }
      } catch (error) {
        console.error('Erreur lors de la récupération des VMs :', error);
        vmidSelect.innerHTML = `<option value="" disabled>Loading error</option>`;
      }
    }

    // Charger les VMs dès le chargement de la page
    document.addEventListener('DOMContentLoaded', () => {
      fetchVMs();
    });

    document.getElementById('deleteVmForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const vmidSelect = document.getElementById('vmid');
      const vmid = vmidSelect.value;
      const vmNode = vmidSelect.selectedOptions[0]?.dataset?.node || '';

      if (!await showConfirm(`Are you sure you want to delete VM with VMID ${vmid}?`)) {
        return; // Annuler la suppression si l'utilisateur clique sur "Annuler"
      }
  
      // Fonction pour récupérer les cookies
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
      }
  
      let username, password;
  
      try {
        // Récupérer le cookie contenant les identifiants
        const userCredentials = getCookie('userCredentials');
  
        if (!userCredentials) {
          throw new Error('Cookie userCredentials introuvable');
        }
  
        // Décoder le cookie
        const decodedUrl = decodeURIComponent(userCredentials);
        const decodedCredentials = atob(decodedUrl);
  
        // Extraire le nom d'utilisateur et le mot de passe
        [username, password] = decodedCredentials.split(':');
  
        if (!username || !password) {
          throw new Error('Identifiant ou mot de passe manquant après décodage');
        }
      } catch (error) {
        console.error('Erreur lors du décodage du cookie userCredentials :', error);
        showToast('Authentication cookie error. Please log in again.', 'error');
        window.location.href = '/login';
        return; // Arrêter l'exécution si le cookie est invalide
      }
  
      try {
        // Envoi de la requête de suppression avec les identifiants
        const response = await fetch(`/vms/${vmid}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&node=${encodeURIComponent(vmNode)}`, {
          method: 'DELETE',
          credentials: 'include',
        });
  
        const resultElement = document.getElementById('result');
        if (response.ok) {
          const message = await response.text();
          resultElement.className = 'success-message';
          resultElement.textContent = `Succès : ${message}`;
          setTimeout(() => (window.location.href = '/dashboard'), 1000);
        } else {
          const errorText = await response.text();
          resultElement.className = 'error-message';
          resultElement.textContent = `Erreur : ${errorText}`;
        }
      } catch (error) {
        console.error('Erreur lors de la suppression de la VM :', error);
        const resultElement = document.getElementById('result');
        resultElement.className = 'error-message';
        resultElement.textContent = 'Une erreur est survenue lors de la suppression de la VM.';
      }
    });
  </script>
  <script src="./toast.js"></script>
  <script src="./logout.js"></script>
</body>
</html>
