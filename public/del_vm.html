<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supprimer une VM</title>
  <link rel="icon" type="image/x-icon" href="./VMM.ico">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
    }

    /* Navbar Styles */
    .modern-navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: #2c3e50;
      color: white;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      flex-wrap: wrap;
    }

    .modern-navbar .logo {
      font-size: 1.5em;
      font-weight: bold;
      flex: 1 1 auto;
    }

    .modern-navbar .nav-links {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      flex: 1 1 auto;
    }

    .modern-navbar .nav-links li {
      display: inline;
    }

    .modern-navbar .nav-links a {
      text-decoration: none;
      font-weight: bold;
      color: white;
      padding: 10px 15px;
      border-radius: 15px;
      background-color: #364b61;
      transition: background-color 0.3s ease;
      text-align: center;
    }

    .modern-navbar .nav-links a:hover {
      background-color: #2c3e50;
    }

    #logout {
      background-color: #991818;
    }

    #logout:hover {
      background-color: #bb2121;
    }

    .welcome {
      text-align: center;
      padding: 20px;
      background-color: #ecf0f1;
      border-bottom: 1px solid #dcdcdc;
      width: 100%;
    }

    .welcome h1 {
      margin: 0;
      font-size: 2em;
      color: #2c3e50;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .delete-vm-container {
      margin-top: 30px;
      width: 600px;
      max-width: 400px;
      background: #fff;
      overflow: hidden;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      align-items: center;
    }

    .delete-vm-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .delete-vm-container label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    .delete-vm-container input {
      width: 95%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .delete-vm-container button {
      width: 100%;
      padding: 10px;
      background: #d9534f;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1em;
    }

    .delete-vm-container button:hover {
      background: #c9302c;
    }

    .error-message {
      color: red;
      text-align: center;
      margin-top: 10px;
      font-size: 0.9em;
    }

    .success-message {
      color: green;
      text-align: center;
      margin-top: 10px;
      font-size: 0.9em;
    }

    select {
      width: 99%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    /* Responsive Styles */
    @media (max-width: 885px) {
      .modern-navbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .modern-navbar .nav-links {
        justify-content: flex-start;
        margin-top: 15px;
      }

      .modern-navbar .nav-links a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav class="modern-navbar">
    <img src="./img/VMM.png" alt="VMM" style="width: 50px; margin-right: 5px;">
    <div class="logo">Virtual Machines Manager</div>
    <ul class="nav-links">
      <li><a href="/dashboard">Accueil</a></li>
      <li><a href="https://www.canva.com/design/DAGdy8ez_i0/8oSJ8xHat-2Lvol-OGj4XQ/view?utm_content=DAGdy8ez_i0&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hd46a505919#1" target="_blank">Tuto</a></li>
      <li><a href="/clone-vm">Cloner VM</a></li>
      <li><a href="/new-vm">Nouvelle VM</a></li>
      <li><a href="/del-vm">Supprimer VM</a></li>
      <li><a href="#" id="logout">Se déconnecter</a></li>
    </ul>
  </nav>

  <div class="welcome">
    <h1 id="welcome-user">Supprimer une VM</h1>
  </div>

    <div class="container">
        <div class="delete-vm-container">
            <h2>Supprimer une VM</h2>
            <form id="deleteVmForm">
              <label for="vmid">Sélectionnez une VM</label>
              <select id="vmid" required>
                <option value="" disabled selected>Chargement des VMs...</option>
              </select>
              <button type="submit">Supprimer</button>
            </form>
            <div id="result"></div>
        </div>
    </div>

  <script>
    async function fetchVMs() {
      const vmidSelect = document.getElementById('vmid');
      try {
        // Fonction pour récupérer les cookies
        function getCookie(name) {
          const value = `; ${document.cookie}`;
          const parts = value.split(`; ${name}=`);

          if (parts.length === 2) return parts.pop().split(';').shift();
          return null;
        }

        let username, password;

        try {
          const userCredentials = getCookie('userCredentials');
          if (!userCredentials) throw new Error('Cookie userCredentials introuvable');

          const decodedUrl = decodeURIComponent(userCredentials);
          const decodedCredentials = atob(decodedUrl);

          [username, password] = decodedCredentials.split(':');
          if (!username || !password) throw new Error('Identifiant ou mot de passe manquant');
        } catch (error) {
          console.error('Erreur lors du décodage du cookie userCredentials :', error);
          alert('Erreur avec le cookie d\'authentification. Veuillez vous reconnecter.');
          window.location.href = '/login';
          return;
        }

        // Requête pour récupérer les VMs
        const response = await fetch(`/all-vms?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
        if (!response.ok) throw new Error('Erreur lors de la récupération des VMs.');

        const vms = await response.json();

        if (vms.length === 0) {
          vmidSelect.innerHTML = `<option value="" disabled>Aucune VM disponible</option>`;
          return;
        }

        // Filtrer les VMs pour exclure celles ayant les tags 'template' ou 'perso'
        const filteredVMs = vms.filter(vm => {
          const tags = vm.tags ? vm.tags.split(';').map(tag => tag.trim().toLowerCase()) : [];
          return !tags.includes('template') && !tags.includes('perso');
        });

        // Ajouter les options au select
        if (filteredVMs.length === 0) {
          vmidSelect.innerHTML = `<option value="" disabled>Aucune VM disponible (hors template et perso)</option>`;
        } else {
          vmidSelect.innerHTML = filteredVMs
            .map(vm => `<option value="${vm.vmid}" data-node="${vm.node || ''}">ID: ${vm.vmid} - Nom: ${vm.name}</option>`)
            .join('');
        }
      } catch (error) {
        console.error('Erreur lors de la récupération des VMs :', error);
        vmidSelect.innerHTML = `<option value="" disabled>Erreur lors du chargement</option>`;
      }
    }

    // Charger les VMs dès le chargement de la page
    document.addEventListener('DOMContentLoaded', () => {
      fetchVMs();
    });

    document.getElementById('deleteVmForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const vmidSelect = document.getElementById('vmid');
      const vmid = vmidSelect.value;
      const vmNode = vmidSelect.selectedOptions[0]?.dataset?.node || '';

      if (!confirm(`Êtes-vous sûr de vouloir supprimer la VM avec VMID ${vmid} ?`)) {
        return; // Annuler la suppression si l'utilisateur clique sur "Annuler"
      }
  
      // Fonction pour récupérer les cookies
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
      }
  
      let username, password;
  
      try {
        // Récupérer le cookie contenant les identifiants
        const userCredentials = getCookie('userCredentials');
  
        if (!userCredentials) {
          throw new Error('Cookie userCredentials introuvable');
        }
  
        // Décoder le cookie
        const decodedUrl = decodeURIComponent(userCredentials);
        const decodedCredentials = atob(decodedUrl);
  
        // Extraire le nom d'utilisateur et le mot de passe
        [username, password] = decodedCredentials.split(':');
  
        if (!username || !password) {
          throw new Error('Identifiant ou mot de passe manquant après décodage');
        }
      } catch (error) {
        console.error('Erreur lors du décodage du cookie userCredentials :', error);
        alert('Erreur avec le cookie d\'authentification. Veuillez vous reconnecter.');
        window.location.href = '/login';
        return; // Arrêter l'exécution si le cookie est invalide
      }
  
      try {
        // Envoi de la requête de suppression avec les identifiants
        const response = await fetch(`/vms/${vmid}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&node=${encodeURIComponent(vmNode)}`, {
          method: 'DELETE',
          credentials: 'include',
        });
  
        const resultElement = document.getElementById('result');
        if (response.ok) {
          const message = await response.text();
          resultElement.className = 'success-message';
          resultElement.textContent = `Succès : ${message}`;
          setTimeout(() => (window.location.href = '/dashboard'), 1000);
        } else {
          const errorText = await response.text();
          resultElement.className = 'error-message';
          resultElement.textContent = `Erreur : ${errorText}`;
        }
      } catch (error) {
        console.error('Erreur lors de la suppression de la VM :', error);
        const resultElement = document.getElementById('result');
        resultElement.className = 'error-message';
        resultElement.textContent = 'Une erreur est survenue lors de la suppression de la VM.';
      }
    });
  </script>
  <script src="./logout.js"></script>
</body>
</html>
